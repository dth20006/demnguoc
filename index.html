<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">

<title>⚡ WARRIOR AI PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:
radial-gradient(circle at top,#1a1f2b,#0f1115);
color:#e6e6e6;
margin:0;
padding:20px;
}

.title{
text-align:center;
font-size:40px;
text-shadow:0 0 20px #00ffe0;
margin-bottom:20px;
}

.panel{
border:1px solid #00ffe0;
padding:18px;
border-radius:12px;
margin-bottom:20px;
background:#111a2f;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

.day{
background:#182544;
padding:12px;
border-radius:8px;
}

.moneyInput{
width:90px;
background:#0f1115;
border:1px solid #333;
color:white;
border-radius:8px;
padding:6px;
transition:all .2s;
}

.moneyInput:focus{
outline:none;
border-color:#5b8cff;
box-shadow:0 0 8px rgba(91,140,255,.4);
}

input[type=checkbox]{
width:16px;
height:16px;
accent-color:#5b8cff;
cursor:pointer;
}

.card{
background:rgba(255,255,255,0.03);
border-radius:20px;
padding:20px;
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.05);
box-shadow:
0 10px 30px rgba(0,0,0,0.5),
inset 0 1px rgba(255,255,255,0.05);
transition:all .3s;
}

.card:hover{
transform:translateY(-4px);
box-shadow:
0 20px 40px rgba(0,0,0,0.6);
}

canvas{
margin-top:10px;
}

@media(max-width:600px){
.title{
font-size:22px;
}
}

</style>
</head>

<body>

<div class="title">⚡ WARRIOR AI PRO</div>

<div class="container">

<div class="card">

<h3>📊 Thống kê</h3>

<div class="stats">

<div>Tiến độ: <b id="progress">0%</b></div>

<div>Dự đoán ngày: <b id="dayAI">0</b></div>

<div>Theo giờ: <b id="hourAI">0</b></div>

</div>

</div>

<div class="card">

<h3>🧠 AI gợi ý</h3>

<div id="schedule">Chưa có dữ liệu</div>

</div>

<div class="card">

<h3>📊 Doanh thu ngày</h3>

<canvas id="chartDay"></canvas>

</div>

<div class="card">

<h3>📊 Doanh thu tuần</h3>

<canvas id="chartWeek"></canvas>

</div>

<div class="card">

<h3>📊 Doanh thu tháng</h3>

<canvas id="chartMonth"></canvas>

</div>

</div>

<br>

<div class="card">

<h3>📅 Lịch sinh hoạt & làm việc</h3>

<div class="grid" id="grid"></div>

</div>

<script>

const days=[
"14/03","15/03","16/03","17/03","18/03","19/03","20/03",
"21/03","22/03","23/03","24/03","25/03","26/03","27/03",
"28/03","29/03","30/03","31/03"
];

const shifts=[

"😴 00:00-06:00 Ngủ",
"🚚 06:30-09:00 Ship sáng",
"🍚 09:00 Ăn sáng",
"📚 09:25-11:25 Đi học",
"🚚 11:30-14:00 Ship trưa",
"📚 14:10-16:10 Đi học",
"🚚 16:30-20:00 Ship chiều",
"🍚 20:00 Ăn tối",
"🚚 20:30-23:30 Ship tối"

];

const grid=document.getElementById("grid");

days.forEach(d=>{

let card=document.createElement("div");
card.className="day";

let html="<b>"+d+"</b>";

shifts.forEach(s=>{

html+=`
<div>
<input type="checkbox" onchange="update()"> ${s}
</div>
`;

});

html+=`<br>💰 <input class="moneyInput" type="number" onchange="update()">`;

card.innerHTML=html;

grid.appendChild(card);

});

function getMoney(){

let arr=[];

document.querySelectorAll(".moneyInput").forEach(i=>{

arr.push(Number(i.value)||0);

});

return arr;

}

function update(){

let done=document.querySelectorAll("input[type=checkbox]:checked").length;

let total=document.querySelectorAll("input[type=checkbox]").length;

let progress=Math.round(done/total*100);

document.getElementById("progress").innerText=progress+"%";

saveData();

buildCharts();

AIoptimize();

}

function buildCharts(){

let data=getMoney();

drawDay(data);

drawWeek(data);

drawMonth(data);

}

function drawDay(data){

if(window.dayChart) window.dayChart.destroy();

window.dayChart=new Chart(document.getElementById("chartDay"),{

type:"line",

data:{
labels:days,
datasets:[{
label:"Doanh thu",
data:data,
tension:0.4,
fill:true,
backgroundColor:(ctx)=>{

const chart=ctx.chart;
const {ctx:canvas,chartArea}=chart;

if(!chartArea) return null;

const gradient=canvas.createLinearGradient(
0,
chartArea.top,
0,
chartArea.bottom
);

gradient.addColorStop(0,"rgba(91,140,255,0.5)");
gradient.addColorStop(1,"rgba(91,140,255,0)");

return gradient;

},
borderColor:"#5b8cff",
borderWidth:3,
pointRadius:4
}]
},

options:{
animation:{
duration:1200
}
}

});

}

function drawWeek(data){

let weeks=[];

for(let i=0;i<data.length;i+=7){

weeks.push(data.slice(i,i+7).reduce((a,b)=>a+b,0));

}

if(window.weekChart) window.weekChart.destroy();

window.weekChart=new Chart(document.getElementById("chartWeek"),{

type:"bar",

data:{
labels:["Tuần 1","Tuần 2","Tuần 3","Tuần 4","Tuần 5"],
datasets:[{
label:"Doanh thu",
data:weeks
}]
},

options:{
animation:{
duration:1200
}
}

});

}

function drawMonth(data){

let total=data.reduce((a,b)=>a+b,0);

if(window.monthChart) window.monthChart.destroy();

window.monthChart=new Chart(document.getElementById("chartMonth"),{

type:"doughnut",

data:{
labels:["Đã kiếm","Mục tiêu"],
datasets:[{
data:[total,10000000-total]
}]
},

options:{
animation:{
animateRotate:true,
duration:1400
}
}

});

}

function AIoptimize(){

let data=getMoney();

let avg=data.reduce((a,b)=>a+b,0)/data.length;

let plan="";

if(avg>200000){

plan="🔥 Buổi tối đang là giờ kiếm tiền tốt nhất";

}
else if(avg>120000){

plan="🚀 Trưa + tối ổn định";

}
else{

plan="⚠ Nên chạy thêm buổi sáng";

}

document.getElementById("schedule").innerText=
"Doanh thu TB: "+Math.round(avg)+"\n"+plan;

document.getElementById("dayAI").innerText=Math.round(avg*1.2);

document.getElementById("hourAI").innerText=Math.round(avg/8);

}

function saveData(){

let checks=[...document.querySelectorAll("input[type=checkbox]")]
.map(c=>c.checked);

let money=[...document.querySelectorAll(".moneyInput")]
.map(m=>m.value);

localStorage.setItem("warriorChecks",JSON.stringify(checks));
localStorage.setItem("warriorMoney",JSON.stringify(money));

}

function loadData(){

let checks=JSON.parse(localStorage.getItem("warriorChecks")||"[]");
let money=JSON.parse(localStorage.getItem("warriorMoney")||"[]");

document.querySelectorAll("input[type=checkbox]").forEach((c,i)=>{
if(checks[i]) c.checked=true;
});

document.querySelectorAll(".moneyInput").forEach((m,i)=>{
if(money[i]) m.value=money[i];
});

}

loadData();
update();

</script>

</body>
</html>
