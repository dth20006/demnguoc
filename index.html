<style>
/* --- GIAO DIỆN IPHONE NATIVE --- */
:root {
  --ios-bg: #000000;
  --ios-card: #1c1c1e;
  --ios-cyan: #00ffe0;
  --text-main: #ffffff;
  --text-secondary: #8e8e93;
  --ios-blue: #0a84ff;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background-color: var(--ios-bg);
  color: var(--text-main);
  margin: 0;
  padding: 0 16px 40px 16px;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

.header-ios {
  padding: 40px 0 20px 0;
  position: sticky;
  top: 0;
  background: rgba(0,0,0,0.8);
  backdrop-filter: saturate(180%) blur(20px);
  z-index: 100;
  margin: 0 -16px 20px -16px;
  padding-left: 16px;
}

.title {
  font-size: 34px;
  font-weight: 800;
  letter-spacing: -0.5px;
  background: linear-gradient(to right, #00ffe0, #0a84ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.container { display: flex; flex-direction: column; gap: 20px; }

.card {
  background: var(--ios-card);
  border-radius: 20px;
  padding: 18px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.05);
}

.card h3 {
  margin-top: 0; font-size: 18px; font-weight: 600; color: var(--ios-cyan);
  display: flex; align-items: center; gap: 8px;
}

.grid { display: flex; flex-direction: column; gap: 12px; }

.day {
  background: #2c2c2e; padding: 20px; border-radius: 16px;
  border-left: 5px solid var(--ios-blue);
  animation: fadeIn 0.5s ease-out;
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.day b { font-size: 20px; display: block; margin-bottom: 15px; color: var(--ios-cyan); }

.task-item { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; font-size: 16px; color: #ffffff; }

input[type="checkbox"] {
  appearance: none; width: 24px; height: 24px; border: 2px solid #3a3a3c;
  border-radius: 50%; cursor: pointer; position: relative; transition: 0.2s;
}

input[type="checkbox"]:checked { background-color: var(--ios-cyan); border-color: var(--ios-cyan); }

input[type="checkbox"]:checked::after {
  content: '✓'; position: absolute; color: black; font-size: 15px; left: 5px; top: 1px; font-weight: bold;
}

.money-action { display: flex; align-items: center; gap: 10px; margin-top: 20px; padding-top: 15px; border-top: 1px solid #3a3a3c; }

.moneyInput { flex: 1; background: #1c1c1e; border: 1px solid #3a3a3c; color: white; border-radius: 12px; padding: 10px 15px; font-size: 16px; outline: none; }
.moneyInput:focus { border-color: var(--ios-cyan); }

.btn-add {
  background: var(--ios-cyan); color: #000; border: none; border-radius: 50%;
  width: 36px; height: 36px; cursor: pointer; font-weight: bold; font-size: 20px;
  display: flex; align-items: center; justify-content: center;
}

/* --- HEATMAP & MÈO ĐI TUẦN --- */
.heatmap { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-top: 15px; position: relative; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 12px; }

.heat { aspect-ratio: 1/1; border-radius: 4px; background: #3a3a3c; }
.heat.low {background:#0e4429;}
.heat.mid {background:#006d32;}
.heat.high {background:#26a641;}
.heat.max {background:#39d353;}

.stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 0.5px solid #3a3a3c; }
.stat-row:last-child { border: none; }
.stat-label { color: var(--text-secondary); }
.stat-value { font-weight: 600; color: var(--ios-cyan); }

/* --- HIỆU ỨNG MÈO BƯỚC ĐI --- */
.cat-wrapper { 
  position: absolute; 
  transition: all 1.5s ease-in-out; 
  pointer-events: none; 
  z-index: 10; 
  display: flex;
  flex-direction: column;
  align-items: center;
}
.cat-sprite { 
  font-size: 28px; 
  display: inline-block;
  animation: catWalkCycle 0.8s infinite ease-in-out; 
  transform-origin: bottom center;
}
.cat-speech {
  background: white; color: black; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 700;
  position: absolute; top: -38px; left: 50%; transform: translateX(-50%); opacity: 0; transition: 0.3s; white-space: nowrap;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}
.cat-speech.show { opacity: 1; }

@keyframes catWalkCycle {
  0% { transform: translateY(0) rotate(-5deg) scale(1, 1); }
  25% { transform: translateY(-5px) rotate(0deg) scale(0.9, 1.1); }
  50% { transform: translateY(0) rotate(5deg) scale(1.1, 0.9); }
  75% { transform: translateY(-5px) rotate(0deg) scale(0.9, 1.1); }
  100% { transform: translateY(0) rotate(-5deg) scale(1, 1); }
}
</style>

const grid = document.getElementById("grid");
const now = new Date();
const todayStr = String(now.getDate()).padStart(2, '0') + '/' + String(now.getMonth() + 1).padStart(2, '0');

function renderSchedule() {
  grid.innerHTML = "";
  let foundToday = false;
  schedule.forEach((day, index) => {
    if (day[0] === todayStr) {
      foundToday = true;
      let card = document.createElement("div");
      card.className = "day";
      let html = `<b>📅 Hôm nay: ${day[0]}</b>`;
      for (let i = 1; i < day.length; i++) {
        html += `<div class="task-item"><input type="checkbox" data-index="${index}-${i}" onchange="update();notifyTask(this)"><span>${day[i]}</span></div>`;
      }
      html += `<div class="money-action"><span style="font-size:18px">💰</span><input class="moneyInput" type="number" data-index="${index}" placeholder="Tiền..." onchange="update();notifyMoney(this)"><button class="btn-add" onclick="quickAdd(${index})">+</button></div>`;
      card.innerHTML = html;
      grid.appendChild(card);
    }
  });
  if (!foundToday) grid.innerHTML = "<div style='text-align:center; padding:20px; color:#8e8e93;'>Nghỉ ngơi thôi sếp dth206! ☕</div>";
}

function quickAdd(index) {
  let input = document.querySelector(`.moneyInput[data-index="${index}"]`);
  let currentVal = Number(input.value) || 0;
  let addVal = prompt("Nhập số tiền cộng thêm cho " + schedule[index][0] + ":");
  if (addVal !== null && addVal !== "" && !isNaN(addVal)) {
    let newVal = currentVal + Number(addVal);
    input.value = newVal;
    update();
    sendTelegram(`➕ Thêm ${addVal} vào ${schedule[index][0]}. Tổng: ${newVal}`);
  }
}

function getMoney() {
  const savedMoney = JSON.parse(localStorage.getItem("money") || "[]");
  return schedule.map((_, i) => Number(savedMoney[i]) || 0);
}

function update() {
  const allChecks = document.querySelectorAll("input[type=checkbox]");
  const done = [...allChecks].filter(c => c.checked).length;
  const total = allChecks.length || 1;
  document.getElementById("progress").innerText = Math.round(done / total * 100) + "%";
  saveData(); buildCharts(); drawHeatmap(getMoney()); AIoptimize();
}

function buildCharts() {
  let data = getMoney(); drawDay(data); drawWeek(data); drawMonth(data);
}

function drawDay(data) {
  if (window.dayChart) window.dayChart.destroy();
  const ctx = document.getElementById("chartDay").getContext("2d");
  const gradient = ctx.createLinearGradient(0, 0, 0, 300);
  gradient.addColorStop(0, "rgba(0,255,224,0.4)");
  gradient.addColorStop(1, "rgba(0,255,224,0)");
  window.dayChart = new Chart(ctx, {
    type: "line",
    data: { labels: schedule.map(d => d[0]), datasets: [{ label: "Doanh thu", data: data, fill: true, backgroundColor: gradient, borderColor: "#00ffe0", borderWidth: 2, tension: 0.4, pointRadius: 0 }] },
    options: { scales: { y: { beginAtZero: true } } }
  });
}

function drawWeek(data) {
  let weeks = [];
  for (let i = 0; i < data.length; i += 7) weeks.push(data.slice(i, i + 7).reduce((a, b) => a + b, 0));
  if (window.weekChart) window.weekChart.destroy();
  window.weekChart = new Chart(document.getElementById("chartWeek"), {
    type: "bar",
    data: { labels: ["Tuần 1", "Tuần 2", "Tuần 3", "Tuần 4", "Tuần 5"], datasets: [{ label: "Doanh thu", data: weeks, backgroundColor: "#0a84ff", borderRadius: 5 }] }
  });
}

function drawMonth(data) {
  let total = data.reduce((a, b) => a + b, 0);
  if (window.monthChart) window.monthChart.destroy();
  window.monthChart = new Chart(document.getElementById("chartMonth"), {
    type: "doughnut",
    data: { labels: ["Kiếm được", "Cần thêm"], datasets: [{ data: [total, Math.max(0, 10000000 - total)], backgroundColor: ["#30d158", "#1c1c1e"], borderWidth: 0 }] }
  });
}

function drawHeatmap(data) {
  const heat = document.getElementById("heatmap");
  [...heat.children].forEach(child => { if(child.id !== 'cat') child.remove(); });
  let max = Math.max(...data, 1000);
  data.forEach(v => {
    let div = document.createElement("div");
    div.className = "heat";
    let ratio = v / max;
    if (ratio < 0.1) div.style.opacity = "0.3";
    else if (ratio < 0.3) div.classList.add("low");
    else if (ratio < 0.6) div.classList.add("mid");
    else if (ratio < 0.8) div.classList.add("high");
    else div.classList.add("max");
    heat.appendChild(div);
  });
}

function AIoptimize() {
  let data = getMoney();
  let total = data.reduce((a, b) => a + b, 0);
  let avg = total / (data.filter(v => v > 0).length || 1);
  let plan = avg > 200000 ? "🔥 Hiệu suất rất tốt! Mèo khen sếp nhé." : "⚠ AI nhắc: Chăm chỉ nổ đơn hơn nhé dth206!";
  document.getElementById("schedule_ai").innerText = plan;
  document.getElementById("dayAI").innerText = Math.round(avg).toLocaleString() + "đ";
  document.getElementById("hourAI").innerText = Math.round(avg / 8).toLocaleString() + "đ";
}

function saveData() {
  const checks = {};
  document.querySelectorAll("input[type=checkbox]").forEach(c => { checks[c.getAttribute("data-index")] = c.checked; });
  const savedMoney = JSON.parse(localStorage.getItem("money") || "[]");
  document.querySelectorAll(".moneyInput").forEach(m => { savedMoney[m.getAttribute("data-index")] = m.value; });
  localStorage.setItem("checks_today", JSON.stringify(checks));
  localStorage.setItem("money", JSON.stringify(savedMoney));
  backupCloud(checks, savedMoney);
}

function loadData() {
  const checks = JSON.parse(localStorage.getItem("checks_today") || "{}");
  const money = JSON.parse(localStorage.getItem("money") || "[]");
  document.querySelectorAll("input[type=checkbox]").forEach(c => { if (checks[c.getAttribute("data-index")]) c.checked = true; });
  document.querySelectorAll(".moneyInput").forEach(m => { if (money[m.getAttribute("data-index")]) m.value = money[m.getAttribute("data-index")]; });
}

/* --- HÀM BẮN PHÁO HOA TẠI VỊ TRÍ CLICK --- */
function launchFireworks(x, y) {
  const duration = 2 * 1000;
  const animationEnd = Date.now() + duration;
  const defaults = { startVelocity: 25, spread: 360, ticks: 60, zIndex: 9999, colors: ['#00ffe0', '#0a84ff', '#ffffff', '#ff0055'] };

  const interval = setInterval(function() {
    const timeLeft = animationEnd - Date.now();
    if (timeLeft <= 0) return clearInterval(interval);
    
    const particleCount = 20 * (timeLeft / duration);
    // Bắn từ tâm của tick box
    confetti({ 
      ...defaults, 
      particleCount, 
      origin: { x: x / window.innerWidth, y: y / window.innerHeight } 
    });
  }, 100);
}

function notifyTask(el) {
  if (el.checked) {
    // Kích hoạt pháo hoa ngay khi tick
    const rect = el.getBoundingClientRect();
    launchFireworks(rect.left + rect.width / 2, rect.top + rect.height / 2);

    const taskName = el.nextElementSibling.innerText;
    const time = new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
    sendTelegram(`<b>────────────────</b>\n<b>✅ NHIỆM VỤ XONG</b>\n<b>────────────────</b>\n<b>Mục:</b> <code>${taskName}</code>\n<b>Lúc:</b> 🕒 ${time}\n🚀 <i>Làm tốt lắm dth206!</i>`);
  }
}

function notifyMoney(el) {
  const amount = Number(el.value);
  if (amount > 0) {
    sendTelegram(`<b>────────────────</b>\n<b>💰 LÚA VỀ</b>\n<b>────────────────</b>\n<b>Số tiền:</b> 💵 <code>${amount.toLocaleString()} VND</code>\n📅 ${todayStr}\n✨ <i>Tiền đẻ ra tiền!</i>`);
  }
}

/* --- LOGIC MÈO DI CHUYỂN & LẬT MẶT --- */
const catQuotes = ["Meo~ Đang đi tuần!", "Làm việc đi sếp dth206!", "Nổ đơn nào! 💰", "Mèo đang canh lúa!", "Hôm nay xanh quá! 🐱"];
let currentStep = 0;
let lastX = 0;

setInterval(() => {
  const cells = document.querySelectorAll(".heat");
  const cat = document.getElementById("cat");
  const catEmoji = document.getElementById("catEmoji");
  const catText = document.getElementById("catText");
  if (!cells.length || !cat) return;

  const target = cells[currentStep];
  const currentX = target.offsetLeft;

  if (currentX > lastX) {
    catEmoji.style.transform = "scaleX(1)"; 
  } else if (currentX < lastX) {
    catEmoji.style.transform = "scaleX(-1)"; 
  }

  cat.style.left = `${target.offsetLeft - 5}px`;
  cat.style.top = `${target.offsetTop - 15}px`;
  
  lastX = currentX;

  if (Math.random() > 0.6) {
    catText.innerText = catQuotes[Math.floor(Math.random() * catQuotes.length)];
    catText.classList.add("show");
    setTimeout(() => catText.classList.remove("show"), 2500);
  }
  
  currentStep = (currentStep + 1) % cells.length;
}, 3000); 

async function backupCloud(checks, money) {
  fetch("https://firestore.googleapis.com/v1/projects/firebawweb/databases/(default)/documents/warrior/data", {
    method: "PATCH", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ fields: { checks: { stringValue: JSON.stringify(checks) }, money: { stringValue: JSON.stringify(money) }, time: { stringValue: new Date().toISOString() } } })
  });
}

renderSchedule();
