<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>⚡ WARRIOR AI PRO</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:radial-gradient(circle at top,#1a1f2b,#0f1115);
  color:#e6e6e6;
  margin:0;
  padding:20px;
}
.title{
  text-align:center;
  font-size:36px;
  text-shadow:0 0 20px #00ffe0;
  margin-bottom:20px;
}
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:20px;
}
.card{
  background:rgba(255,255,255,0.03);
  border-radius:20px;
  padding:20px;
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.05);
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
  transition:.3s;
}
.card:hover{
  transform:translateY(-4px);
}
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
}
.day{
  background:#182544;
  padding:12px;
  border-radius:8px;
}
.moneyInput{
  width:80px;
  background:#0f1115;
  border:1px solid #333;
  color:white;
  border-radius:8px;
  padding:6px;
}
canvas{
  margin-top:10px;
}
@media(max-width:700px){
  .grid{
    grid-template-columns:repeat(2,1fr);
  }
}
/* HEATMAP */
.heatmap{
  display:grid;
  grid-template-columns:repeat(9,1fr);
  gap:6px;
  margin-top:10px;
  position: relative; /* Thêm để định vị Corgi */
}
.heat{
  width:24px;
  height:24px;
  border-radius:4px;
  background:#1f2937;
}
.heat.low{background:#134e4a;}
.heat.mid{background:#0ea5a5;}
.heat.high{background:#22c55e;}
.heat.max{background:#4ade80;}

/* CORGI */
.corgi-wrapper {
  position: absolute;
  transition: all 1.5s cubic-bezier(0.25, 0.8, 0.25, 1);
  pointer-events: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  z-index: 10;
  top: 0;
  left: 0;
  transform: translate(0, 0);
}
.corgi-sprite {
  font-size: 24px;
  animation: bounce 0.4s infinite alternate;
}
.corgi-speech {
  background: #ffffff;
  color: #000000;
  padding: 4px 8px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: bold;
  white-space: nowrap;
  box-shadow: 0 4px 10px rgba(0,0,0,0.5);
  margin-bottom: 4px;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.3s ease;
}
.corgi-speech.show {
  opacity: 1;
  transform: translateY(0);
}
.corgi-speech::after {
  content: '';
  position: absolute;
  bottom: -4px;
  left: 50%;
  transform: translateX(-50%);
  border-width: 5px 5px 0;
  border-style: solid;
  border-color: #ffffff transparent transparent transparent;
  display: block;
  width: 0;
}
@keyframes bounce {
  from { transform: translateY(0); }
  to { transform: translateY(-5px); }
}
</style>
</head>
<body>

<div class="title">⚡ WARRIOR AI PRO</div>

<div class="container">
  <div class="card">
    <h3>📊 Thống kê</h3>
    <div>Tiến độ: <b id="progress">0%</b></div>
    <div>Dự đoán ngày: <b id="dayAI">0</b></div>
    <div>Theo giờ: <b id="hourAI">0</b></div>
  </div>

  <div class="card">

    <div id="schedule">Chưa có dữ liệu</div>
  </div>

  <div class="card">

    <canvas id="chartDay"></canvas>
  </div>

  <div class="card">
    <h3>📊 Doanh thu tuần</h3>
    <canvas id="chartWeek"></canvas>
  </div>

  <div class="card">
    <h3>📊 Doanh thu tháng</h3>
    <canvas id="chartMonth"></canvas>
  </div>

  <div class="card">
    <h3>🔥 Heatmap doanh thu</h3>
    <div id="heatmap" class="heatmap">

        <div id="corgiText" class="corgi-speech"></div>
        <div class="corgi-sprite">🐕</div>
      </div>
    </div>
  </div>
</div>

<br>

// ---------- GRID ----------
const grid=document.getElementById("grid");
schedule.forEach(day=>{
  let card=document.createElement("div");
  card.className="day";
  let html=`<b>${day[0]}</b>`;
  for(let i=1;i<day.length;i++){
    html+=`<div><input type="checkbox" onchange="update();notifyTask(this)"> ${day[i]}</div>`;
  }
  html+=`<br>💰 <input class="moneyInput" type="number" onchange="update();notifyMoney(this)">`;
  card.innerHTML=html;
  grid.appendChild(card);
});

// ---------- MONEY ----------
function getMoney(){return [...document.querySelectorAll(".moneyInput")].map(i=>Number(i.value)||0);}

// ---------- UPDATE ----------
function update(){
  const done=document.querySelectorAll("input[type=checkbox]:checked").length;
  const total=document.querySelectorAll("input[type=checkbox]").length;
  document.getElementById("progress").innerText=Math.round(done/total*100)+"%";
  saveData();
  buildCharts();
  drawHeatmap(getMoney());
  AIoptimize();
}

// ---------- CHART ----------
function buildCharts(){
  let data=getMoney();
  drawDay(data);
  drawWeek(data);
  drawMonth(data);
}

function drawDay(data){
  if(window.dayChart) window.dayChart.destroy();
  const ctx=document.getElementById("chartDay").getContext("2d");
  const gradient=ctx.createLinearGradient(0,0,0,300);
  gradient.addColorStop(0,"rgba(0,255,200,0.5)");
  gradient.addColorStop(1,"rgba(0,255,200,0)");
  window.dayChart=new Chart(ctx,{
    type:"line",
    data:{labels:schedule.map(d=>d[0]), datasets:[{label:"Doanh thu",data:data,fill:true,backgroundColor:gradient,borderColor:"#00ffe0",tension:0.4,pointRadius:4}]}
  });
}

function drawWeek(data){
  let weeks=[];
  for(let i=0;i<data.length;i+=7) weeks.push(data.slice(i,i+7).reduce((a,b)=>a+b,0));
  if(window.weekChart) window.weekChart.destroy();
  window.weekChart=new Chart(document.getElementById("chartWeek"),{
    type:"bar",
    data:{labels:["Tuần 1","Tuần 2","Tuần 3","Tuần 4", "Tuần 5"], datasets:[{label:"Doanh thu",data:weeks}]}
  });
}

function drawMonth(data){
  let total=data.reduce((a,b)=>a+b,0);
  if(window.monthChart) window.monthChart.destroy();
  window.monthChart=new Chart(document.getElementById("chartMonth"),{
    type:"doughnut",
    data:{labels:["Đã kiếm","Mục tiêu"], datasets:[{data:[total,10000000-total]}]}
  });
}

// ---------- HEATMAP THEO CA GIỜ ----------
function drawHeatmap(data){
  const heat=document.getElementById("heatmap");
  // Keep the corgi, clear the rest
  const corgiEl = document.getElementById("corgi");
  heat.innerHTML="";
  if(corgiEl) heat.appendChild(corgiEl);

  let max=Math.max(...data,1000);
  data.forEach(v=>{
    let div=document.createElement("div");
    div.className="heat";
    let ratio=v/max;
    if(ratio<0.3) div.classList.add("low");
    else if(ratio<0.6) div.classList.add("mid");
    else if(ratio<0.8) div.classList.add("high");
    else div.classList.add("max");
    heat.appendChild(div);
  });
}

// ---------- AI DỰ ĐOÁN ----------
function AIoptimize(){
  let data=getMoney();
  let avg=data.reduce((a,b)=>a+b,0)/data.length;
  let plan="";
  if(avg>200000) plan="🔥 Buổi tối kiếm tiền tốt nhất";
  else if(avg>120000) plan="🚀 Trưa + tối ổn định";
  else plan="⚠ Nên chạy thêm buổi sáng";
  document.getElementById("schedule").innerText="Doanh thu TB: "+Math.round(avg)+"\n"+plan;
  document.getElementById("dayAI").innerText=Math.round(avg*1.2);
  document.getElementById("hourAI").innerText=Math.round(avg/8); 
}

// ---------- LOCAL SAVE ----------
function saveData(){
  const checks=[...document.querySelectorAll("input[type=checkbox]")].map(c=>c.checked);
  const money=[...document.querySelectorAll(".moneyInput")].map(m=>m.value);
  localStorage.setItem("checks",JSON.stringify(checks));
  localStorage.setItem("money",JSON.stringify(money));
  backupCloud(checks,money);
}
function loadData(){
  const checks=JSON.parse(localStorage.getItem("checks")||"[]");
  const money=JSON.parse(localStorage.getItem("money")||"[]");
  document.querySelectorAll("input[type=checkbox]").forEach((c,i)=>{if(checks[i]) c.checked=true;});
  document.querySelectorAll(".moneyInput").forEach((m,i)=>{if(money[i]) m.value=money[i];});
}

function notifyTask(el){if(el.checked) sendTelegram("✅ Hoàn thành nhiệm vụ");}
function notifyMoney(el){if(Number(el.value)>0) sendTelegram(`💰 Doanh thu cập nhật: ${Number(el.value)} VND`);}

// ---------- BÁO THỨC CA LÀM QUA TELEGRAM ----------
let notifiedShifts = {};
function checkShifts() {
  const now = new Date();
  const today = String(now.getDate()).padStart(2, '0') + '/' + String(now.getMonth() + 1).padStart(2, '0');
  const timeString = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');

  const todaySchedule = schedule.find(s => s[0] === today);
  if (todaySchedule) {
    for (let i = 1; i < todaySchedule.length; i++) {
      let task = todaySchedule[i];
      let startTime = "";
      let match1 = task.match(/^(\d{2}):(\d{2})/);
      let match2 = task.match(/^(\d{2})-(\d{2})h/);
      
      if (match1) startTime = `${match1[1]}:${match1[2]}`;
      else if (match2) startTime = `${match2[1]}:00`;

      if (startTime && timeString === startTime) {
        const shiftKey = today + "_" + task;
        if (!notifiedShifts[shiftKey]) {
          sendTelegram(`⏰ ĐẾN GIỜ RỒI: ${task.split(': ')[1] || task}`);
          notifiedShifts[shiftKey] = true;
        }
      }
    }
  }
}

const corgiQuotes = [

  "Đừng lười nha! 😡", 
  "Nổ đơn rồiii! 💰",

  "Hôm nay đạt target nhé! 🔥",
  "Tăng tốc nào! ⚡"

function moveCorgi() {
  const heatmap = document.getElementById("heatmap");
  const cells = heatmap.getElementsByClassName("heat");
  const corgi = document.getElementById("corgi");
  const corgiText = document.getElementById("corgiText");
  if (!cells.length || !corgi) return;

  const randomCell = cells[Math.floor(Math.random() * cells.length)];
  const topPos = randomCell.offsetTop;
  const leftPos = randomCell.offsetLeft;

  // Di chuyển Corgi
  corgi.style.transform = `translate(${leftPos - 12}px, ${topPos - 25}px)`;

  // Hiện lời thoại ngẫu nhiên
  if (Math.random() > 0.3) {
    corgiText.innerText = corgiQuotes[Math.floor(Math.random() * corgiQuotes.length)];
    corgiText.classList.add("show");
    setTimeout(() => corgiText.classList.remove("show"), 3000);
  }
}
setInterval(moveCorgi, 5000);
setTimeout(moveCorgi, 1000);

// ---------- FIREBASE CLOUD ----------
async function backupCloud(checks,money){
  fetch("https://firestore.googleapis.com/v1/projects/firebawweb/databases/(default)/documents/warrior/data",{
    method:"PATCH",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({fields:{checks:{stringValue:JSON.stringify(checks)},money:{stringValue:JSON.stringify(money)},time:{stringValue:new Date().toISOString()}}})
  });
}
