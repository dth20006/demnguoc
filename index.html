<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">

<title>Warrior Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
box-sizing:border-box;
}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#0f1115;
color:#e6e6e6;
margin:0;
padding:20px;
}

.title{
font-size:28px;
font-weight:700;
margin-bottom:20px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:20px;
}

.card{
background:#171a21;
border-radius:16px;
padding:20px;
box-shadow:0 6px 20px rgba(0,0,0,0.5);
}

.card h3{
margin-top:0;
font-weight:600;
}

.stats{
display:flex;
flex-wrap:wrap;
gap:20px;
font-size:16px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:12px;
}

.day{
background:#1f232b;
padding:12px;
border-radius:10px;
font-size:14px;
}

.moneyInput{
width:80px;
background:#111;
border:1px solid #444;
color:white;
border-radius:6px;
padding:4px;
}

input[type=checkbox]{
accent-color:#5b8cff;
}

canvas{
margin-top:10px;
}

@media(max-width:600px){

.title{
font-size:22px;
}

}

</style>
</head>

<body>

<div class="title">🚀 Warrior Productivity Dashboard</div>

<div class="container">

<div class="card">

<h3>📊 Thống kê</h3>

<div class="stats">

<div>Tiến độ: <b id="progress">0%</b></div>

<div>Dự đoán ngày: <b id="dayAI">0</b></div>

<div>Theo giờ: <b id="hourAI">0</b></div>

</div>

</div>

<div class="card">

<h3>🧠 AI gợi ý</h3>

<div id="schedule">Chưa có dữ liệu</div>

</div>

<div class="card">

<h3>📊 Doanh thu ngày</h3>

<canvas id="chartDay"></canvas>

</div>

<div class="card">

<h3>📊 Doanh thu tuần</h3>

<canvas id="chartWeek"></canvas>

</div>

<div class="card">

<h3>📊 Doanh thu tháng</h3>

<canvas id="chartMonth"></canvas>

</div>

</div>

<br>

<div class="card">

<h3>📅 Lịch sinh hoạt & làm việc</h3>

<div class="grid" id="grid"></div>

</div>

<script>

const days=[
"14/03","15/03","16/03","17/03","18/03","19/03","20/03",
"21/03","22/03","23/03","24/03","25/03","26/03","27/03",
"28/03","29/03","30/03","31/03"
];

const shifts=[

"😴 00:00-06:00 Ngủ",
"🚚 06:30-09:00 Ship sáng",
"🍚 09:00 Ăn sáng",
"📚 09:25-11:25 Đi học",
"🚚 11:30-14:00 Ship trưa",
"📚 14:10-16:10 Đi học",
"🚚 16:30-20:00 Ship chiều",
"🍚 20:00 Ăn tối",
"🚚 20:30-23:30 Ship tối"

];

const grid=document.getElementById("grid");

days.forEach(d=>{

let card=document.createElement("div");
card.className="day";

let html="<b>"+d+"</b>";

shifts.forEach(s=>{

html+=`
<div>
<input type="checkbox" onchange="update()"> ${s}
</div>
`;

});

html+=`<br>💰 <input class="moneyInput" type="number" onchange="update()">`;

card.innerHTML=html;

grid.appendChild(card);

});

function getMoney(){

let arr=[];

document.querySelectorAll(".moneyInput").forEach(i=>{

arr.push(Number(i.value)||0);

});

return arr;

}

function update(){

let done=document.querySelectorAll("input[type=checkbox]:checked").length;

let total=document.querySelectorAll("input[type=checkbox]").length;

let progress=Math.round(done/total*100);

document.getElementById("progress").innerText=progress+"%";

buildCharts();

AIoptimize();

}

function buildCharts(){

let data=getMoney();

drawDay(data);

drawWeek(data);

drawMonth(data);

}

function drawDay(data){

if(window.dayChart) window.dayChart.destroy();

window.dayChart=new Chart(document.getElementById("chartDay"),{

type:"line",

data:{
labels:days,
datasets:[{
label:"Doanh thu",
data:data,
tension:0.4
}]
},

options:{
animation:{
duration:1200
}
}

});

}

function drawWeek(data){

let weeks=[];

for(let i=0;i<data.length;i+=7){

weeks.push(data.slice(i,i+7).reduce((a,b)=>a+b,0));

}

if(window.weekChart) window.weekChart.destroy();

window.weekChart=new Chart(document.getElementById("chartWeek"),{

type:"bar",

data:{
labels:["Tuần 1","Tuần 2","Tuần 3","Tuần 4","Tuần 5"],
datasets:[{
label:"Doanh thu",
data:weeks
}]
},

options:{
animation:{
duration:1200
}
}

});

}

function drawMonth(data){

let total=data.reduce((a,b)=>a+b,0);

if(window.monthChart) window.monthChart.destroy();

window.monthChart=new Chart(document.getElementById("chartMonth"),{

type:"doughnut",

data:{
labels:["Đã kiếm","Mục tiêu"],
datasets:[{
data:[total,10000000-total]
}]
},

options:{
animation:{
animateRotate:true,
duration:1400
}
}

});

}

function AIoptimize(){

let data=getMoney();

let avg=data.reduce((a,b)=>a+b,0)/data.length;

let plan="";

if(avg>200000){

plan="🔥 Buổi tối đang là giờ kiếm tiền tốt nhất";

}
else if(avg>120000){

plan="🚀 Trưa + tối ổn định";

}
else{

plan="⚠ Nên chạy thêm buổi sáng";

}

document.getElementById("schedule").innerText=
"Doanh thu TB: "+Math.round(avg)+"\n"+plan;

document.getElementById("dayAI").innerText=Math.round(avg*1.2);

document.getElementById("hourAI").innerText=Math.round(avg/8);

}

</script>

</body>
</html>
