<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Lịch Trình Shipper 30 Ngày</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #2c3e50; padding: 20px; }
        h2 { text-align: center; color: #fff; text-transform: uppercase; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        th { background: #f39c12; color: white; padding: 12px; font-size: 13px; text-transform: uppercase; }
        td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; font-size: 12px; }
        tr:hover { background: #fff9c4; }
        tr.completed { background: #e0e0e0; opacity: 0.6; }
        tr.completed td { text-decoration: line-through; }
        input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; }
        .time { font-weight: bold; color: #d35400; display: block; font-size: 11px; }
    </style>
</head>
<body>

<h2>LỊCH TRÌNH CHIẾN BINH SHIPPER</h2>
<table>
    <thead>
        <tr>
            <th>Ngày</th><th>Ngủ (00-06h)</th><th>Sáng (07-09h)</th><th>Ca 2 (09-11h)</th><th>Trưa (11-14h)</th><th>Ca 4 (14-16h)</th><th>Chiều/Tối (16-23h)</th><th>Done</th>
        </tr>
    </thead>
    <tbody id="body"></tbody>
</table>

<script>
    const data = [
        ["12/03 (T5)", "6 Tiếng", "Ship", "Anh 1.2", "Ship", "Ship", "Ship"],
        ["13/03 (T6)", "6 Tiếng", "Ship", "Ship", "Ship", "Dữ liệu", "Ship"],
        ["14/03 (T7)", "6 Tiếng", "Ship", "Anh 1.2", "Ship", "Online", "Ship"],
        ["15/03 (CN)", "6 Tiếng", "Ship Full", "Ship Full", "Ship Full", "Ship Full", "Ship Tối"],
        ["16/03 (T2)", "6 Tiếng", "Ship", "Ship", "Ship", "Dữ liệu", "Ship"],
        ["17/03 (T3)", "6 Tiếng", "Ship", "Anh 1.2", "Ship", "Online", "Ship"],
        ["18/03 (T4)", "6 Tiếng", "Ship", "Ship", "Ship", "Dữ liệu", "Ship"],
        ["19/03 (T5)", "6 Tiếng", "Ship", "Anh 1.2", "Ship", "Online", "Ship"],
        ["20/03 (T6)", "6 Tiếng", "Ship", "Ship", "Ship", "Dữ liệu", "Ship"],
        ["21/03 (T7)", "6 Tiếng", "Ship", "Anh 1.2", "Ship", "Online", "Ship"],
        ["22/03 (CN)", "6 Tiếng", "Ship Full", "Ship Full", "Ship Full", "Ship Full", "Ship Tối"],
        ["23/03 (T2)", "6 Tiếng", "Ship", "Ship", "Ship", "Dữ liệu", "Ship"],
        ["24/03 (T3)", "6 Tiếng", "Ship", "Anh 1.2", "Ship", "Online", "Ship"],
        ["25/03 (T4)", "6 Tiếng", "Ship", "Ship", "Ship", "Dữ liệu", "Ship"],
        ["26/03 (T5)", "6 Tiếng", "Ship", "Anh 1.2", "Ship", "Online", "Ship"],
        ["27/03 (T6)", "6 Tiếng", "Ship", "Ship", "Ship", "Dữ liệu", "Ship"],
        ["28/03 (T7)", "6 Tiếng", "Ship", "Anh 1.2", "Ship", "Online", "Ship"],
        ["29/03 (CN)", "6 Tiếng", "Ship Full", "Ship Full", "Ship Full", "Ship Full", "Ship Tối"],
        ["30/03 (T2)", "6 Tiếng", "Ship", "Ship", "Ship", "Dữ liệu", "Ship"],
        ["31/03 (T3)", "6 Tiếng", "Ship", "Anh 1.2", "Ship", "Online", "Ship"],
        ["01/04 (T4)", "6 Tiếng", "Ship", "Ship", "Ship", "Dữ liệu", "Ship"],
        ["02/04 (T5)", "6 Tiếng", "Ship", "Anh 1.2", "Ship", "Online", "Ship"],
        ["03/04 (T6)", "6 Tiếng", "Ship", "Ship", "Ship", "Dữ liệu", "Ship"],
        ["04/04 (T7)", "6 Tiếng", "Ship", "Anh 1.2", "Ship", "Online", "Ship"],
        ["05/04 (CN)", "6 Tiếng", "Ship Full", "Ship Full", "Ship Full", "Ship Full", "Ship Tối"],
        ["06/04 (T2)", "6 Tiếng", "Ship", "Ship", "Ship", "Dữ liệu", "Ship"],
        ["07/04 (T3)", "6 Tiếng", "Ship", "Anh 1.2", "Ship", "Online", "Ship"],
        ["08/04 (T4)", "6 Tiếng", "Ship", "Ship", "Ship", "Dữ liệu", "Ship"],
        ["09/04 (T5)", "6 Tiếng", "Ship", "Anh 1.2", "Ship", "Online", "Ship"],
        ["10/04 (T6)", "6 Tiếng", "Ship", "Ship", "Ship", "Dữ liệu", "Ship"]
    ];

    const body = document.getElementById('body');
    data.forEach((row, i) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${row[0]}</td><td>${row[1]}</td><td>${row[2]}</td><td>${row[3]}</td><td>${row[4]}</td><td>${row[5]}</td><td>${row[6]}</td>
                        <td><input type="checkbox" onchange="toggle(this, ${i})"></td>`;
        body.appendChild(tr);
    });

    function toggle(cb, i) {
        cb.closest('tr').classList.toggle('completed', cb.checked);
        localStorage.setItem('task_'+i, cb.checked);
    }

    window.onload = () => {
        document.querySelectorAll('input').forEach((cb, i) => {
            if(localStorage.getItem('task_'+i) === 'true') {
                cb.checked = true;
                cb.closest('tr').classList.add('completed');
            }
        });
    }
</script>
</body>
</html>
